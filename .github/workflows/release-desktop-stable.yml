name: Release Desktop Stable

# Builds the downloadable Windows installer + the electron-updater feed
# (ADR-024). This is SEPARATE from ci.yml/deploy.yml (which gate + deploy the
# web app) so the desktop release never blocks, and is never blocked by, a web
# deploy.
#
# Trigger: an annotated SemVer tag `vX.Y.Z` cuts a release (the tag drives the
# installer version — see ADR-024 "version reconciliation"). This production
# workflow intentionally has no workflow_dispatch trigger and uses a new path.
# Credential-free manual packaging lives in release-desktop-dry-run.yml. Disable
# the historical release-desktop.yml workflow ID before this rename merges. The
# desktop-production environment and new STABLE_* secrets are required only
# before a future stable tag, not for the free Preview-governance merge.
#
# Tag releases are fail-closed signed builds (ADR-135/142).
on:
  push:
    tags: ['v*']

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-stable-tag:
    name: Validate stable release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Reject non-stable or lightweight tags
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: node scripts/validate-release-tag.mjs stable "${GITHUB_REF_NAME}"

  build-windows:
    name: Build Windows installer
    needs: validate-stable-tag
    runs-on: windows-latest
    environment: desktop-production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so the web bundle's git-derived build badge is real
          # (vite.config.ts appVersion). The installer version comes from the
          # tag, not the commit count — see the version step below.
          fetch-depth: 0

      - name: Set up pnpm
        # No `with.version` — package.json's packageManager field is the single
        # source of truth (see ci.yml).
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Derive release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${VERSION}"

      - name: Verify canonical release repository
        run: pnpm guard:repo

      - name: Release verification gate
        # Same green-gate as the web CI, on Windows. Also builds dist/web and
        # dist-electron, which electron-builder then packages.
        run: pnpm release:check

      - name: Require tag-release signing credentials
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.STABLE_WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.STABLE_WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) {
            throw 'Tag releases require the CSC_LINK signing certificate secret.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_KEY_PASSWORD)) {
            throw 'Tag releases require the CSC_KEY_PASSWORD secret.'
          }

      - name: Build signed Windows installer + update feed
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: bash
        # dist/web + dist-electron already exist from release:check; package
        # them. `-c.extraMetadata.version` overrides package.json's static
        # 0.1.0 so the .exe, app.getVersion(), and latest.yml all agree.
        # `--publish never` still emits latest.yml + .blockmap locally; upload
        # to R2 happens in a later step.
        run: |
          pnpm exec electron-builder --win --x64 \
            --config.extraMetadata.version="${{ steps.version.outputs.version }}" \
            --config.extraMetadata.kerfdeskUpdateChannelTrusted=true \
            --config.forceCodeSigning=true \
            --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.STABLE_WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.STABLE_WINDOWS_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'

      - name: Verify signed tag installer
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $installer = "release/$env:VERSION/LaserForge-2.0-$env:VERSION-x64-setup.exe"
          $signature = Get-AuthenticodeSignature -LiteralPath $installer
          if ($signature.Status -ne 'Valid') {
            throw "Installer Authenticode signature is not valid: $($signature.StatusMessage)"
          }
          if ([string]::IsNullOrWhiteSpace($signature.SignerCertificate.Subject)) {
            throw 'Installer signature has no publisher identity.'
          }
          "Verified publisher: $($signature.SignerCertificate.Subject)"

      - name: Upload installer + update feed as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: kerfdesk-windows-${{ steps.version.outputs.version }}
          path: |
            release/${{ steps.version.outputs.version }}/*.exe
            release/${{ steps.version.outputs.version }}/*.exe.blockmap
            release/${{ steps.version.outputs.version }}/latest.yml
          if-no-files-found: error

      # Publish to the self-hosted electron-updater feed on Cloudflare R2
      # (ADR-024). This production workflow is tag-push-only; credential-free
      # packaging exercises live in release-desktop-dry-run.yml. Requires the
      # desktop-production environment secrets STABLE_R2_API_TOKEN (with
      # R2-write scope) + STABLE_CLOUDFLARE_ACCOUNT_ID, and an R2 bucket
      # `kerfdesk-downloads` mapped to https://dl.kerfdesk.com (the publish.url
      # in electron-builder.yml). The bucket key layout mirrors that URL:
      # latest.yml + the versioned .exe/.blockmap live under `desktop/`.
      - name: Publish installer + update feed to Cloudflare R2
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.STABLE_R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.STABLE_CLOUDFLARE_ACCOUNT_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bucket="kerfdesk-downloads"
          dir="release/${VERSION}"
          exe="LaserForge-2.0-${VERSION}-x64-setup.exe"
          immutable="public, max-age=31536000, immutable"

          # Versioned installer + blockmap are content-addressed → cache forever.
          pnpm exec wrangler r2 object put "${bucket}/desktop/${exe}" \
            --file "${dir}/${exe}" --content-type application/octet-stream \
            --cache-control "${immutable}" --remote
          pnpm exec wrangler r2 object put "${bucket}/desktop/${exe}.blockmap" \
            --file "${dir}/${exe}.blockmap" --content-type application/octet-stream \
            --cache-control "${immutable}" --remote

          # The updater feed moves each release → must revalidate, never cache.
          pnpm exec wrangler r2 object put "${bucket}/desktop/latest.yml" \
            --file "${dir}/latest.yml" --content-type text/yaml \
            --cache-control "no-cache" --remote

          # Stable filename for the /download page's first-time link (also moves
          # each release, so short cache).
          pnpm exec wrangler r2 object put "${bucket}/desktop/kerfdesk-latest-x64-setup.exe" \
            --file "${dir}/${exe}" --content-type application/octet-stream \
            --cache-control "public, max-age=300" --remote
