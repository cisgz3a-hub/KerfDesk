name: Deploy to Cloudflare Pages

# Runs AFTER the CI workflow succeeds on main (R-H5 audit fix —
# previously deploy ran in parallel with CI, so a commit that broke
# tests / lint but built cleanly would publish). Manual trigger from
# the Actions tab still works for re-deploys without a new commit
# (e.g. after editing _headers).
#
# Cloudflare Pages serves a "Preview" environment per branch by default;
# we force --branch=master to hit the production URL (the legacy repo
# was created with master as the production branch). See note in
# package.json's deploy:web script.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Cancel a queued deploy if a newer commit lands while one is running.
# Cloudflare Pages handles a fast cancel gracefully (the in-flight one
# completes; the new one queues right after).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Required for actions/checkout — read access is enough; the deploy
# itself authenticates via CLOUDFLARE_API_TOKEN, not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    name: Build + deploy web bundle
    runs-on: ubuntu-latest
    # workflow_run fires for EVERY CI completion (success + failure).
    # The condition below gates on the success path; manual dispatches
    # also pass (they have no workflow_run to inspect).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so the version-badge `git rev-parse
          # --short HEAD` step finds a real commit (the default shallow
          # clone has depth 1 and works, but a deeper clone helps
          # debugging in the Actions log).
          fetch-depth: 1

      - name: Set up pnpm
        # See ci.yml for why no `with.version` — package.json's
        # packageManager field is the single source of truth.
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — see ci.yml comment. pnpm 11.3.0 needs ≥22.13.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm build:web

      - name: Publish to Cloudflare Pages
        # cloudflare/wrangler-action is the official Cloudflare action.
        # We pin to v3 (current stable) — major bumps would change auth
        # input names. The `command` is the standard `wrangler pages
        # deploy` invocation; the action handles auth via the env vars.
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web --project-name=laserforge --branch=master
