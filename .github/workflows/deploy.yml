name: Deploy to Cloudflare Pages

# Runs AFTER the CI workflow succeeds on main (R-H5 audit fix —
# previously deploy ran in parallel with CI, so a commit that broke
# tests / lint but built cleanly would publish). Manual trigger from
# the Actions tab still works for re-deploys without a new commit
# (e.g. after editing _headers).
#
# Cloudflare Pages serves a "Preview" environment per branch by default;
# the Pages project production branch is main, matching the GitHub
# default branch. See note in package.json's deploy:web script.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Cancel a queued deploy if a newer commit lands while one is running.
# Cloudflare Pages handles a fast cancel gracefully (the in-flight one
# completes; the new one queues right after).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Required for actions/checkout — read access is enough; the deploy
# itself authenticates via CLOUDFLARE_API_TOKEN, not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    name: Build + deploy web bundle
    runs-on: ubuntu-latest
    # workflow_run fires for EVERY CI completion (success + failure).
    # Manual dispatches are production deploys, so the selected ref must
    # be main and the job still re-runs the shared release gate below.
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # M33 (AUDIT-2026-06-10): for workflow_run events GITHUB_SHA is the
          # default branch's CURRENT tip, not the commit whose CI succeeded —
          # a push race (or a re-run of an old green CI) would deploy a
          # different commit than the one validated. Pin the checkout to the
          # triggering run's head SHA; manual dispatches deploy the selected
          # ref (gated to main above) and re-prove everything below anyway.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          # Fetch full history so the version badge's `git rev-list --count
          # HEAD` (the auto build number, see vite.config.ts appVersion) is the
          # real total, not the shallow-clone 1. `git rev-parse --short HEAD`
          # for the SHA works at any depth.
          fetch-depth: 0

      - name: Set up pnpm
        # See ci.yml for why no `with.version` — package.json's
        # packageManager field is the single source of truth.
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS — see ci.yml comment. pnpm 11.3.0 needs ≥22.13.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Release verification gate
        run: pnpm release:check

      - name: Publish to Cloudflare Pages
        # cloudflare/wrangler-action is the official Cloudflare action.
        # v4 installs Wrangler CLI v4 by default (matches this repo's
        # wrangler ^4.100.0); the apiToken/accountId/command inputs are
        # unchanged from v3. The `command` is the standard `wrangler pages
        # deploy` invocation; the action handles auth via the env vars.
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web --project-name=laserforge --branch=main
