name: Browser smoke

# Runs on main pushes as well as PRs so a direct-to-main commit (which
# happens in this repo) still gets the only automated check that loads the
# real app in a browser (rolling audit 2026-07-17-0450 P2-1). OBSERVABILITY
# ONLY on main: deploy.yml gates on the CI workflow alone — making deploys
# additionally require this workflow would be a new blocking gate and needs
# explicit maintainer approval per ADR-206 first.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chrome:
    name: Chrome UX smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chrome
        run: pnpm exec playwright install --with-deps chrome

      - name: Type-check browser tests
        run: pnpm typecheck:e2e

      - name: Run browser smoke
        run: pnpm test:e2e

      - name: Upload browser artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
