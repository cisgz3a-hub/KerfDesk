name: Windows Signed Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Attach signed artifacts to a draft GitHub Release
        required: true
        default: false
        type: boolean
      release_tag:
        description: Existing release tag to attach artifacts to, for example v1.0.0
        required: false
        type: string
      release_qa_confirmed:
        description: Confirm installer QA/hardware verification was completed before publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-signed:
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WIN_CERT_PFX_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Verify signing secrets
        shell: pwsh
        run: |
          if (-not $env:CSC_LINK) { throw "WIN_CERT_PFX_BASE64 secret is required for signed Windows releases." }
          if (-not $env:CSC_KEY_PASSWORD) { throw "WIN_CERT_PASSWORD secret is required for signed Windows releases." }
      - name: Validate GitHub Release publish input
        if: ${{ inputs.publish_release }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_QA_CONFIRMED: ${{ inputs.release_qa_confirmed }}
        run: |
          if (-not $env:RELEASE_TAG) { throw "release_tag is required when publish_release is true." }
          if ($env:RELEASE_QA_CONFIRMED -ne "true") { throw "release_qa_confirmed must be true after installer QA/hardware verification before publishing signed release assets." }
      - run: npm ci
      - run: npm run build
      - run: npm run electron:compile
      - run: npm run icons:ico
      - name: Build signed Windows installer
        run: npx electron-builder --win --config scripts/signing/electron-builder.windows-signed.cjs --publish never
      - name: Generate SHA256 checksums
        run: node scripts/generate-checksums.mjs release
      - name: Generate SBOM
        run: node scripts/generate-sbom.mjs release/sbom.cdx.json
      - name: Generate Windows installer provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: 'release/*.exe'
      - name: Generate Windows installer SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: 'release/*.exe'
          sbom-path: 'release/sbom.cdx.json'
      - uses: actions/upload-artifact@v4
        with:
          name: windows-signed-installer
          path: |
            release/*.exe
            release/SHA256SUMS
            release/sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
      - name: Prepare Windows release assets
        if: ${{ inputs.publish_release }}
        shell: pwsh
        run: |
          Copy-Item -LiteralPath release/SHA256SUMS -Destination release/SHA256SUMS.windows -Force
          Copy-Item -LiteralPath release/sbom.cdx.json -Destination release/sbom.windows.cdx.json -Force
      - name: Publish Windows artifacts to GitHub Release
        if: ${{ inputs.publish_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release view "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY" --draft --title "$env:RELEASE_TAG" --notes "Draft LaserForge release created by the signed Windows workflow."
          }
          gh release upload "$env:RELEASE_TAG" release/*.exe release/SHA256SUMS.windows release/sbom.windows.cdx.json --repo "$env:GITHUB_REPOSITORY" --clobber
