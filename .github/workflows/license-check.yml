name: License Compliance Check

on:
  pull_request:
    branches: [master, main]
    paths:
      - package.json
      - package-lock.json
      - scripts/license-check.mjs
      - .github/workflows/license-check.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    runs-on: ubuntu-latest
    name: Verify no GPL/AGPL/commercial-restricting licenses
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run license check
        run: npm run license-check

      - name: Generate license report (on failure or manual run)
        if: ${{ failure() || github.event_name == 'workflow_dispatch' }}
        run: npm run license-check:report

      - name: Upload license report as artifact
        if: ${{ failure() || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v7
        with:
          name: license-report
          path: licenses-report.csv
          retention-days: 90

      - name: Post summary
        if: success()
        run: |
          echo "All dependencies use commercially-compatible licenses."
          echo "Summary:"
          npm run license-check:summary
