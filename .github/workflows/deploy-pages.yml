name: Deploy Web App to GitHub Pages

# T1-113: deploy the web build to GitHub Pages from protected branches and
# when explicitly requested, preserving the tester deployment path at
# https://stolkjohannjohann-sudo.github.io/LaserForge/.
#
# One-time manual prerequisite: repo Settings → Pages → Source must
# be set to "GitHub Actions". This workflow cannot enable Pages on
# the repo itself. Set repo variable ENABLE_GITHUB_PAGES_DEPLOY=true
# after Pages is available; otherwise the deploy job stays skipped so
# unsupported plans do not make every master push red.
#
on:
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize in-flight deploys: only one Pages deploy runs at a time,
# the latest queued push wins. Two rapid master pushes collapse to
# one final state instead of racing.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: ${{ vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
