name: macOS Signed Notarized Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Attach signed artifacts to a draft GitHub Release
        required: true
        default: false
        type: boolean
      release_tag:
        description: Existing release tag to attach artifacts to, for example v1.0.0
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-signed:
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MAC_SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Verify signing and notarization secrets
        shell: bash
        run: |
          test -n "$CSC_LINK" || { echo "MAC_CERT_P12_BASE64 secret is required for signed macOS releases."; exit 1; }
          test -n "$CSC_KEY_PASSWORD" || { echo "MAC_CERT_PASSWORD secret is required for signed macOS releases."; exit 1; }
          test -n "$APPLE_ID" || { echo "APPLE_ID secret is required for notarized macOS releases."; exit 1; }
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || { echo "APPLE_APP_SPECIFIC_PASSWORD secret is required for notarized macOS releases."; exit 1; }
          test -n "$APPLE_TEAM_ID" || { echo "APPLE_TEAM_ID secret is required for notarized macOS releases."; exit 1; }
      - name: Validate GitHub Release publish input
        if: ${{ inputs.publish_release }}
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          test -n "$RELEASE_TAG" || { echo "release_tag is required when publish_release is true."; exit 1; }
      - run: npm ci
      - run: npm run build
      - run: npm run electron:compile
      - run: npm run icons:ico
      - name: Build signed and notarized macOS DMG
        run: npx electron-builder --mac --config scripts/signing/electron-builder.macos-signed.cjs --publish never
      - name: Generate SHA256 checksums
        run: node scripts/generate-checksums.mjs release
      - name: Generate SBOM
        run: node scripts/generate-sbom.mjs release/sbom.cdx.json
      - name: Generate macOS installer provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: 'release/*.dmg'
      - name: Generate macOS installer SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: 'release/*.dmg'
          sbom-path: 'release/sbom.cdx.json'
      - uses: actions/upload-artifact@v4
        with:
          name: macos-signed-notarized-dmg
          path: |
            release/*.dmg
            release/SHA256SUMS
            release/sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
      - name: Prepare macOS release assets
        if: ${{ inputs.publish_release }}
        shell: bash
        run: |
          cp release/SHA256SUMS release/SHA256SUMS.macos
          cp release/sbom.cdx.json release/sbom.macos.cdx.json
      - name: Publish macOS artifacts to GitHub Release
        if: ${{ inputs.publish_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft --title "$RELEASE_TAG" --notes "Draft LaserForge release created by the signed macOS workflow."
          gh release upload "$RELEASE_TAG" release/*.dmg release/SHA256SUMS.macos release/sbom.macos.cdx.json --repo "$GITHUB_REPOSITORY" --clobber
