name: CI

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # T2-106: dependency security scan. --omit=dev skips vitest/eslint/etc.
      # where dev-only CVEs don't ship to users; --audit-level=moderate fails
      # CI on moderate-or-higher production-dependency CVEs. Verified clean
      # at ship time (2026-05-05): `npm audit --omit=dev --audit-level=moderate`
      # → "found 0 vulnerabilities".
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run build
      - run: npm test

  build-windows:
    # T2-98: prove the real Windows installer path on demand.
    # Signing is deliberately left for T2-99 release builds.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run electron:compile
      - run: npm run build
      - run: npm run electron:build
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error
          retention-days: 7

  build-macos:
    # T2-98: prove the real macOS installer path on demand.
    # T2-100 adds signing/notarization secrets for release builds.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run electron:compile
      - run: npm run build
      - run: npm run electron:build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 7
