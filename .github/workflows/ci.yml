name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same PR branch when a new commit lands —
# but NOT on main. Rapid merge trains (2026-07-21) cancelled every main run
# before it finished, so main never got a completed verdict and deploy.yml,
# which fires only on a successful CI completion, starved: production sat
# hours stale while PRs kept landing. With cancellation off, the in-flight
# main run always finishes and triggers a deploy of its validated SHA;
# GitHub still keeps only one PENDING run per group, so intermediate queued
# pushes are superseded (shown as cancelled) and the tip always runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    name: Lint, typecheck, license, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        # No `with.version` — pnpm/action-setup@v6 rejects when both
        # the action input AND package.json's `packageManager` field
        # are set. We pin via packageManager: "pnpm@11.3.0" in
        # package.json (npm-standard, more specific). The action
        # reads it automatically.
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS — required by pnpm 11.3.0 (which uses node:sqlite,
          # added in Node 22.5). Bumped from 20 after pnpm/action-setup@v4
          # surfaced the version conflict. Node 20 goes EOL Apr 2026; 22
          # is the current LTS through Apr 2027.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release verification gate
        run: pnpm release:check
