name: 🐞 Bug report
description: Something in KerfDesk behaved incorrectly — wrong output, a crash, or a broken control.
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For feature ideas, questions, or
        general feedback, please use [Discussions](https://github.com/cisgz3a-hub/KerfDesk/discussions) instead.

        ⚠️ **Safety:** never post a job you have not verified. If a bug produced unsafe
        machine motion, describe it — do not re-run it to reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I imported an SVG and the fill rendered outside the shape…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact sequence that triggers the bug. A sample file or screenshot helps a lot.
      placeholder: |
        1. Import '...'
        2. Set layer mode to '...'
        3. Preview / export G-code
        4. See '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead? If you know how LightBurn behaves here, say so.
    validations:
      required: false
  - type: dropdown
    id: machine-kind
    attributes:
      label: Machine type
      options:
        - Laser
        - CNC router
        - Both
        - Not machine-specific
    validations:
      required: true
  - type: input
    id: controller
    attributes:
      label: Controller / firmware
      description: e.g. GRBL 1.1f, grblHAL, FluidNC, Marlin — or "N/A" if it isn't about output.
      placeholder: GRBL 1.1f
    validations:
      required: false
  - type: input
    id: app-version
    attributes:
      label: KerfDesk version
      description: From the Help → About dialog (version + commit).
      placeholder: v0.0.0 (abc1234)
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Where are you running KerfDesk?
      options:
        - Web app (Chrome / Edge / Brave)
        - Desktop app (Windows)
        - Other (note it below)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: G-code, project file, logs, or screenshots
      description: Attach a `.lf` project, an exported `.gcode`/`.nc` snippet, or the browser console output if relevant.
    validations:
      required: false
