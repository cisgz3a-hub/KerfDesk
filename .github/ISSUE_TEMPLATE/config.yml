# Bugs go through the structured form above; everything else (feature ideas,
# questions, feedback) is routed to Discussions to keep the issue tracker
# actionable. Flip blank_issues_enabled to true if you want to allow ad-hoc
# blank issues as well.
blank_issues_enabled: false
contact_links:
