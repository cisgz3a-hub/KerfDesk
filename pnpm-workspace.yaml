allowBuilds:
  esbuild: true
  unrs-resolver: true
  electron: true
  electron-builder: true
  app-builder-lib: true
  '@electron/get': true
  # Pulled in transitively by electron-builder for the Squirrel.Windows
  # installer format. We build with NSIS via `electron-builder --win
  # --x64` so this post-install never runs. False keeps the warning
  # quiet without granting unused build privilege.
  electron-winstaller: false
  # Pulled in transitively by wrangler (Cloudflare Pages deploy CLI).
  # `sharp` is a native image lib used for asset optimization at deploy
  # time; `workerd` is the Cloudflare runtime used by `wrangler dev`.
  # Both need post-install build steps to function. Granting them is
  # standard for any project that uses wrangler.
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - electron@42.3.0
  - tmp@0.2.6
  - miniflare@4.20260526.0
  - wrangler@4.95.0
  - esbuild@0.28.1
# Force newer transitive `tmp` to clear CVE GHSA-ph9p-34f9-6g65 (path
# traversal). The vulnerable copy is pulled in by
# @malept/flatpak-bundler (Linux Flatpak builder), which is dead code
# for our Windows NSIS target — but the override is the clean way to
# get a green audit anyway. Safe: tmp@0.2.x patches are ABI-stable.
#
# Force transitive `esbuild` >=0.28.1 to clear GHSA-gv7w-rqvm-qjhr (high,
# Deno-installer binary-integrity RCE) and GHSA-g7r4-m6w7-qqqr (low, Windows
# dev-server file read). Both are dev-tooling-only (the production web bundle
# is clean) and neither attack path is reachable here — we do not run
# esbuild's Deno installer or its `serve`; vite only uses esbuild for
# transform/bundle. vite 6.x pins ~0.25 and wrangler pins 0.27.3 exactly, so
# neither parent moves on its own.
#
# Force the remaining transitive package advisories to their patched minors.
# These are toolchain-only except `form-data` through jsdom test tooling:
# wrangler/miniflare pins ws below the GHSA-96hv-2xvq-fx4p patch, jsdom pins
# form-data below the GHSA-hmw2-7cc7-3qxx patch, and ESLint's config parser
# pins js-yaml below the GHSA-h67p-54hq-rp68 patch. Electron-builder's
# node-gyp path pulls Undici 6.x below the GHSA-vxpw-j846-p89q,
# GHSA-p88m-4jfj-68fv, GHSA-35p6-xmwp-9g52, and GHSA-g8m3-5g58-fq7m
# patches; Electron/Wrangler pull Undici 7.x below the GHSA-vmh5-mc38-953g
# and GHSA-pr7r-676h-xcf6 patches.
#
# 2026-07-21 advisory wave, all denial-of-service and all build/dev-only —
# nothing here reaches the shipped web bundle. Electron-builder's
# app-builder-lib and node-gyp paths pull `tar` below the GHSA-w8wr-v893-vjvp,
# GHSA-gvwx-54wh-qm9j, and unlimited-input-decompression patches (7.5.19 clears
# all three). ESLint/minimatch chains pull `brace-expansion` below its
# exponential-expansion patch on three separate majors, so each vulnerable
# range is pinned to its own patched line. `js-yaml` moves 4.2.0 -> 4.3.0 for
# the merge-key quadratic-CPU advisory.
overrides:
  tmp@<0.2.6: ^0.2.6
  esbuild@<0.28.1: ^0.28.1
  ws@<8.21.0: 8.21.0
  form-data@<4.0.6: 4.0.6
  js-yaml@<4.3.0: 4.3.0
  tar@<7.5.19: 7.5.19
  brace-expansion@<1.1.16: 1.1.16
  brace-expansion@>=2.0.0 <2.1.2: 2.1.2
  brace-expansion@>=3.0.0 <5.0.7: 5.0.7
  undici@>=6.0.0 <6.27.0: 6.27.0
  undici@>=7.0.0 <7.28.0: 7.28.0
