allowBuilds:
  esbuild: true
  unrs-resolver: true
  electron: true
  electron-builder: true
  app-builder-lib: true
  '@electron/get': true
  # Pulled in transitively by electron-builder for the Squirrel.Windows
  # installer format. We build with NSIS via `electron-builder --win
  # --x64` so this post-install never runs. False keeps the warning
  # quiet without granting unused build privilege.
  electron-winstaller: false
  # Pulled in transitively by wrangler (Cloudflare Pages deploy CLI).
  # `sharp` is a native image lib used for asset optimization at deploy
  # time; `workerd` is the Cloudflare runtime used by `wrangler dev`.
  # Both need post-install build steps to function. Granting them is
  # standard for any project that uses wrangler.
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - electron@42.3.0
  - tmp@0.2.6
  - miniflare@4.20260526.0
  - wrangler@4.95.0
# Force newer transitive `tmp` to clear CVE GHSA-ph9p-34f9-6g65 (path
# traversal). The vulnerable copy is pulled in by
# @malept/flatpak-bundler (Linux Flatpak builder), which is dead code
# for our Windows NSIS target — but the override is the clean way to
# get a green audit anyway. Safe: tmp@0.2.x patches are ABI-stable.
overrides:
  tmp@<0.2.6: ^0.2.6
