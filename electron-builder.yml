appId: dev.laserforge.app
productName: LaserForge 2.0

directories:
  output: release/${version}
  buildResources: build

# Only ship what's needed at runtime: the compiled Electron main + the Vite
# web bundle. node_modules pruning is handled by electron-builder using the
# production dependency tree.
files:
  - dist-electron/**/*
  - '!dist-electron/**/*.map'
  - dist/web/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: LaserForge-2.0-${version}-${arch}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: LaserForge 2.0
  # The installer shows the EULA and requires acceptance before install —
  # the sold desktop build must surface the use grant + safety terms.
  license: public/eula.txt

# macOS / Linux targets remain commented; ADR-007 keeps them out of MVP.
# mac:
#   target: dmg
# linux:
#   target: AppImage

# Self-hosted generic update feed on Cloudflare R2 (ADR-024). Configuring a
# `publish` block makes electron-builder emit `latest.yml` + `.blockmap`;
# electron-updater reads `latest.yml` from this URL. The CI release job uploads
# those files plus the `.exe` to the bucket behind this origin. The URL is
# pinned here at build time — never arbitrary (PROJECT.md security posture).
publish:
  provider: generic
  url: https://dl.kerfdesk.com/desktop
