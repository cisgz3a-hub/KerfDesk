appId: dev.laserforge.app
productName: LaserForge 2.0

directories:
  output: release/${version}
  buildResources: build

# Only ship what's needed at runtime: the compiled Electron main + the Vite
# web bundle. node_modules pruning is handled by electron-builder using the
# production dependency tree.
files:
  - dist-electron/**/*
  - '!dist-electron/**/*.map'
  - dist/web/**/*
  - package.json

win:
  # electron-updater verifies downloaded NSIS updates against the publisher
  # identity from the installed signed build. Keep this explicit in config.
  verifyUpdateCodeSignature: true
  target:
    - target: nsis
      arch:
        - x64
  artifactName: LaserForge-2.0-${version}-${arch}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: LaserForge 2.0
  # NSIS displays the MIT License & Safety Notice before installation; this
  # adds no restriction and does not authorize future commercial terms.
  license: public/eula.txt

# This stable Windows config keeps macOS / Linux targets absent. ADR-248 governs
# the future Mac Preview config/workflow; Linux remains out of scope.
# mac:
#   target: dmg
# linux:
#   target: AppImage

# Self-hosted generic update feed on Cloudflare R2 (ADR-024). Configuring a
# `publish` block makes electron-builder emit `latest.yml` + `.blockmap`;
# electron-updater reads `latest.yml` from this URL. The CI release job uploads
# those files plus the `.exe` to the bucket behind this origin. The URL is
# pinned here at build time — never arbitrary (PROJECT.md security posture).
publish:
  provider: generic
  url: https://dl.kerfdesk.com/desktop
